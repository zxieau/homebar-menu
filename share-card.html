<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jimmy’s Home Bar · 分享二维码</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        color: #f0e4ce;
        background: #100d0b;
        place-items: center;
        font-family: Georgia, "Noto Serif SC", serif;
      }
      .card {
        width: min(100%, 148mm);
        min-height: 210mm;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20mm 15mm;
        border: 1px solid #c79a52;
        background: radial-gradient(circle at 50% 30%, #351a19, #100d0b 58%);
        text-align: center;
      }
      .eyebrow { color: #c79a52; font-size: 10px; letter-spacing: .35em; }
      .monogram {
        display: grid;
        width: 48px;
        height: 48px;
        margin: 22px 0 14px;
        color: #e4c68e;
        border: 1px solid #c79a52;
        border-radius: 50%;
        place-items: center;
        font-size: 24px;
        font-style: italic;
      }
      h1 { margin: 0; font-size: 38px; font-weight: 500; line-height: 1.05; }
      h1 em { display: block; color: #e4c68e; font-size: 26px; font-weight: 400; }
      .intro { margin: 18px 0 24px; color: #c5b69f; font-size: 13px; letter-spacing: .08em; }
      .qr-wrap { padding: 12px; background: #fff; }
      .qr-wrap img { display: block; width: 64mm; height: 64mm; }
      .action { margin: 20px 0 6px; color: #e4c68e; font-size: 15px; letter-spacing: .18em; }
      .url { margin: 0; color: #8e8171; font-size: 9px; word-break: break-all; }
      @media print {
        @page { size: A5 portrait; margin: 0; }
        body { padding: 0; background: #100d0b; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
        .card { width: 148mm; height: 210mm; border: 0; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">PRIVATE POUR</p>
      <div class="monogram" aria-hidden="true">J</div>
      <h1>Jimmy’s <em>Home Bar</em></h1>
      <p class="intro">今晚想喝点什么？</p>
      <div class="qr-wrap">
        <img src="./assets/jimmys-homebar-qr.png" alt="Jimmy’s Home Bar 菜单二维码" />
      </div>
      <p class="action">扫码翻开酒单</p>
      <p class="url">https://zxieau.github.io/homebar-menu/</p>
    </main>
  </body>
</html>
